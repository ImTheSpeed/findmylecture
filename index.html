<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Code Locator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Logo at the top -->
  <div class="logo">
    <img src="your-logo-link-here" alt="Campus Logo">
  </div>

  <!-- Input box and button -->
  <div class="main-container">
    <input type="text" id="codeInput" placeholder="Type lecture / lab code here">
    <button onclick="findLocation()">Find My Lec.</button>
    <div class="result-box">
      <p id="result">[LECTURE / LAB LOCATION APPEARS HERE]</p>
    </div>
  </div>

  <!-- Message and Static Map -->
  <div class="map-message">
    <p>University Interactive Map Soon! So use the static one for now :D.</p>
    <p>[PHOTO FOR STATIC MAP HERE]</p>
  </div>

  <!-- Footer -->
  <footer>
    <p>All Rights Reserved for Galala University and me, Yes ME (SPEED) THE CREATOR OF THIS</p>
  </footer>

  <!-- Link to JavaScript -->
  <script src="script.js"></script>
</body>
</html>
