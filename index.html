<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Code Locator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Logo at the top -->
  <div class="logo">
    <img src="your-logo-link-here" alt="Campus Logo">
  </div>

  <!-- Input box and button -->
  <div class="main-container">
    <h1>Enter Code Here</h1>
    <input type="text" id="codeInput" placeholder="Enter your code">
    <button onclick="findLocation()">Find my lecture/lab</button>
    <p id="result"></p> <!-- This will show the room details -->
  </div>

  <!-- Message at the bottom -->
  <footer>
    <p>Interactive map soon</p>
  </footer>

  <!-- Link to JavaScript -->
  <script src="script.js"></script>
</body>
</html>
